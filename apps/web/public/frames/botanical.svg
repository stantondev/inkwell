  <path d="M28 10 Q24 6, 28 4 Q32 6, 28 10Z" fill="#3d7a4f" opacity="0.5"/>
  <!-- Small flower accents (5 flowers at compass points) -->
  <!-- Top flower -->
  <circle cx="60" cy="2" r="2.5" fill="#d4899a" opacity="0.6"/>
  <circle cx="60" cy="2" r="1" fill="#e8a8b5" opacity="0.8"/>
  <!-- Right flower -->
  <circle cx="117" cy="60" r="2.5" fill="#d4899a" opacity="0.55"/>
  <circle cx="117" cy="60" r="1" fill="#e8a8b5" opacity="0.75"/>
  <!-- Bottom flower -->
  <circle cx="60" cy="118" r="2.5" fill="#d4899a" opacity="0.6"/>
  <circle cx="60" cy="118" r="1" fill="#e8a8b5" opacity="0.8"/>
  <!-- Left flower -->
  <circle cx="3" cy="60" r="2.5" fill="#d4899a" opacity="0.55"/>
  <circle cx="3" cy="60" r="1" fill="#e8a8b5" opacity="0.75"/>
  <!-- Tiny berry dots -->
  <circle cx="84" cy="8" r="1.5" fill="#c97b8b" opacity="0.45"/>
  <circle cx="36" cy="8" r="1.5" fill="#c97b8b" opacity="0.45"/>
  <circle cx="84" cy="112" r="1.5" fill="#c97b8b" opacity="0.45"/>
  <circle cx="36" cy="112" r="1.5" fill="#c97b8b" opacity="0.45"/>
