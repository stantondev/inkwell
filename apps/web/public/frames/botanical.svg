  <path d="M96 20 Q102 18, 102 24 Q96 24, 96 20Z" fill="#3d7a4f" opacity="0.5"/>
  <!-- Right cluster -->
  <path d="M112 50 Q118 48, 116 56 Q112 54, 112 50Z" fill="#4a8c5c" opacity="0.6"/>
  <path d="M114 62 Q120 62, 116 68 Q112 66, 114 62Z" fill="#3d7a4f" opacity="0.55"/>
  <path d="M112 56 Q116 54, 116 60 Q112 58, 112 56Z" fill="#5a9c6a" opacity="0.4"/>
