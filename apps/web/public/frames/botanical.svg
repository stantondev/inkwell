  <path d="M50 115 Q54 122, 58 115 Q54 112, 50 115Z" fill="#4a8c5c" opacity="0.65"/>
  <path d="M62 116 Q66 122, 70 116 Q66 113, 62 116Z" fill="#3d7a4f" opacity="0.6"/>
  <path d="M55 112 Q58 117, 62 112 Q58 110, 55 112Z" fill="#5a9c6a" opacity="0.45"/>
  <!-- Bottom-left cluster -->
  <path d="M22 96 Q16 96, 20 104 Q24 100, 22 96Z" fill="#4a8c5c" opacity="0.6"/>
  <path d="M26 104 Q22 106, 26 110 Q30 106, 26 104Z" fill="#3d7a4f" opacity="0.5"/>
  <!-- Left cluster -->
  <path d="M8 50 Q2 48, 4 56 Q8 54, 8 50Z" fill="#4a8c5c" opacity="0.6"/>
  <path d="M6 62 Q0 62, 4 68 Q8 66, 6 62Z" fill="#3d7a4f" opacity="0.55"/>
  <path d="M8 56 Q4 54, 4 60 Q8 58, 8 56Z" fill="#5a9c6a" opacity="0.4"/>
