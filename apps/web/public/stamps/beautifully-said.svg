<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "Beautifully Said" — open book with sparkle -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Open book — left page -->
  <path d="M36 30 L36 58 C32 55 24 53 16 54 L16 28 C24 27 32 28 36 30Z"
        fill="currentColor" opacity="0.7"/>
  <!-- Open book — right page -->
  <path d="M36 30 L36 58 C40 55 48 53 56 54 L56 28 C48 27 40 28 36 30Z"
        fill="currentColor" opacity="0.6"/>
  <!-- Book spine highlight -->
  <line x1="36" y1="30" x2="36" y2="58" stroke="currentColor" stroke-width="1.5" opacity="0.9"/>
  <!-- Page lines (left) -->
  <line x1="20" y1="34" x2="33" y2="35" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  <line x1="20" y1="38" x2="33" y2="39" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  <line x1="20" y1="42" x2="33" y2="43" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  <line x1="20" y1="46" x2="33" y2="47" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  <!-- Page lines (right) -->
  <line x1="39" y1="35" x2="52" y2="34" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  <line x1="39" y1="39" x2="52" y2="38" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  <line x1="39" y1="43" x2="52" y2="42" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  <line x1="39" y1="47" x2="52" y2="46" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>
  <!-- Sparkle/star above book -->
  <path d="M36 20 L37.5 24 L42 25 L38 27.5 L39 32 L36 29 L33 32 L34 27.5 L30 25 L34.5 24Z"
        fill="currentColor" opacity="0.65"/>
  <!-- Small sparkle accents -->
  <circle cx="26" cy="22" r="1" fill="currentColor" opacity="0.3"/>
  <circle cx="46" cy="22" r="1" fill="currentColor" opacity="0.3"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="76" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="1" font-variant="small-caps">BEAUTIFULLY SAID</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">Well written</text>
</svg>
