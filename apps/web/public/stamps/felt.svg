<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "Felt" — I felt this (heart with resonance) -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Heart icon -->
  <path d="M36 58 C36 58 18 46 18 34 C18 28.5 22 24 27.5 24 C31 24 34 26.5 36 29 C38 26.5 41 24 44.5 24 C50 24 54 28.5 54 34 C54 46 36 58 36 58Z"
        fill="currentColor" opacity="0.8"/>
  <!-- Resonance rings -->
  <path d="M14 33 C12.5 29 14 23.5 18 20.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.35" fill="none"/>
  <path d="M10 36 C8 30 10 22 15 18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.2" fill="none"/>
  <path d="M58 33 C59.5 29 58 23.5 54 20.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.35" fill="none"/>
  <path d="M62 36 C64 30 62 22 57 18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.2" fill="none"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="77" text-anchor="middle" font-size="7" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="2" font-variant="small-caps">FELT</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">I felt this</text>
</svg>
