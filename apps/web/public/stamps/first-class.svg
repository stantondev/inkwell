<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "First Class" — winged envelope (Plus exclusive) -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Envelope body -->
  <rect x="22" y="34" width="28" height="20" rx="1.5" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.15" opacity="0.8"/>
  <!-- Envelope flap (V shape) -->
  <path d="M22 34 L36 44 L50 34" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <!-- Inner line detail -->
  <line x1="26" y1="46" x2="34" y2="46" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="26" y1="49" x2="30" y2="49" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <!-- Left wing -->
  <path d="M22 38 C16 30 12 24 10 22 C12 24 18 26 22 34"
        fill="currentColor" opacity="0.5"/>
  <path d="M20 40 C14 34 8 28 6 26 C8 28 14 30 20 36"
        fill="currentColor" opacity="0.35"/>
  <!-- Right wing -->
  <path d="M50 38 C56 30 60 24 62 22 C60 24 54 26 50 34"
        fill="currentColor" opacity="0.5"/>
  <path d="M52 40 C58 34 64 28 66 26 C64 28 58 30 52 36"
        fill="currentColor" opacity="0.35"/>
  <!-- Speed lines -->
  <line x1="14" y1="20" x2="20" y2="22" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <line x1="52" y1="22" x2="58" y2="20" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <!-- Star accent (premium feel) -->
  <path d="M36 20 L37.5 24.5 L42 24.5 L38.5 27.5 L39.5 32 L36 29.5 L32.5 32 L33.5 27.5 L30 24.5 L34.5 24.5 Z"
        fill="currentColor" opacity="0.55"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="77" text-anchor="middle" font-size="6" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="1.5" font-variant="small-caps">FIRST CLASS</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">Premium delivery</text>
</svg>
