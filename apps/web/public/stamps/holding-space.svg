<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "Holding Space" — cupped hands with warmth -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Cupped hands -->
  <path d="M22 48 C22 48 20 42 22 38 C24 34 28 32 32 34 L36 36 L40 34 C44 32 48 34 50 38 C52 42 50 48 50 48 L42 54 C40 55.5 38 56 36 56 C34 56 32 55.5 30 54 Z"
        fill="currentColor" opacity="0.75"/>
  <!-- Warmth glow lines above hands -->
  <path d="M30 30 L30 26" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity="0.35"/>
  <path d="M36 28 L36 22" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity="0.45"/>
  <path d="M42 30 L42 26" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity="0.35"/>
  <!-- Soft glow dots -->
  <circle cx="33" cy="22" r="1" fill="currentColor" opacity="0.25"/>
  <circle cx="39" cy="20" r="1" fill="currentColor" opacity="0.25"/>
  <circle cx="36" cy="18" r="1.2" fill="currentColor" opacity="0.3"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="76" text-anchor="middle" font-size="5.5" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="1.2" font-variant="small-caps">HOLDING SPACE</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">For you</text>
</svg>
