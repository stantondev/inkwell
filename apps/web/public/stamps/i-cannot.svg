<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "I Cannot" — bold double exclamation marks with impact lines -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Left exclamation mark — bar -->
  <rect x="22" y="22" width="6" height="26" rx="2.5" fill="currentColor" opacity="0.8"/>
  <!-- Left exclamation mark — dot -->
  <circle cx="25" cy="55" r="3.5" fill="currentColor" opacity="0.8"/>
  <!-- Right exclamation mark — bar -->
  <rect x="44" y="22" width="6" height="26" rx="2.5" fill="currentColor" opacity="0.8"/>
  <!-- Right exclamation mark — dot -->
  <circle cx="47" cy="55" r="3.5" fill="currentColor" opacity="0.8"/>
  <!-- Impact lines — radiating outward -->
  <path d="M14 24 L18 27" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
  <path d="M12 36 L17 36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M14 48 L18 46" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
  <path d="M58 24 L54 27" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
  <path d="M60 36 L55 36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M58 48 L54 46" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="77" text-anchor="middle" font-size="6.5" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="1.5" font-variant="small-caps">I CANNOT</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">I just can't</text>
</svg>
