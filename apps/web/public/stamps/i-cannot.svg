<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "I Cannot" — spiral with burst accents (overwhelm/amazement) -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Spiral from center outward -->
  <path d="M36 38 C36 36 38 35 39 36 C41 37 41 40 39 42 C36 44 33 43 32 40 C31 36 33 32 37 31 C42 30 46 33 47 38 C48 44 44 48 38 49 C31 50 27 45 26 38 C25 30 30 25 38 24"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Exclamation bursts -->
  <path d="M52 22 L56 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M54 28 L58 26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M16 24 L12 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M18 30 L14 28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Burst dots -->
  <circle cx="58" cy="32" r="1.2" fill="currentColor" opacity="0.35"/>
  <circle cx="14" cy="34" r="1.2" fill="currentColor" opacity="0.35"/>
  <circle cx="50" cy="50" r="1" fill="currentColor" opacity="0.25"/>
  <circle cx="22" cy="50" r="1" fill="currentColor" opacity="0.25"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="77" text-anchor="middle" font-size="6.5" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="1.5" font-variant="small-caps">I CANNOT</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">I just can't</text>
</svg>
