<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "Rooting For You" — seedling with rising energy -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Stem -->
  <path d="M36 56 L36 36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Leaves -->
  <path d="M36 36 C36 30 42 26 48 28 C46 34 40 36 36 36"
        fill="currentColor" opacity="0.7"/>
  <path d="M36 42 C36 38 28 34 24 36 C26 40 32 42 36 42"
        fill="currentColor" opacity="0.6"/>
  <!-- Ground line -->
  <path d="M24 56 C28 54 32 55 36 56 C40 55 44 54 48 56"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4" fill="none"/>
  <!-- Rising energy dots -->
  <circle cx="42" cy="22" r="1.2" fill="currentColor" opacity="0.35"/>
  <circle cx="46" cy="18" r="1" fill="currentColor" opacity="0.25"/>
  <circle cx="50" cy="22" r="0.8" fill="currentColor" opacity="0.2"/>
  <circle cx="30" cy="24" r="1" fill="currentColor" opacity="0.25"/>
  <circle cx="26" cy="20" r="0.8" fill="currentColor" opacity="0.2"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="76" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="1" font-variant="small-caps">ROOTING FOR YOU</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">You've got this</text>
</svg>
