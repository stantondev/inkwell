<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "Throwback" — hourglass with falling sand -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Hourglass top frame -->
  <line x1="22" y1="22" x2="50" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Hourglass bottom frame -->
  <line x1="22" y1="58" x2="50" y2="58" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Hourglass glass — top triangle -->
  <path d="M24 24 L36 40 L48 24 Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="currentColor" fill-opacity="0.06" opacity="0.7"/>
  <!-- Hourglass glass — bottom triangle -->
  <path d="M24 56 L36 40 L48 56 Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="currentColor" fill-opacity="0.06" opacity="0.7"/>
  <!-- Sand in top (small pile) -->
  <path d="M30 24 L36 32 L42 24 Z" fill="currentColor" opacity="0.35"/>
  <!-- Sand in bottom (larger pile) -->
  <path d="M28 56 L36 46 L44 56 Z" fill="currentColor" opacity="0.45"/>
  <!-- Falling sand stream -->
  <line x1="36" y1="34" x2="36" y2="44" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.3" stroke-dasharray="2 2"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="77" text-anchor="middle" font-size="6" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="1.5" font-variant="small-caps">THROWBACK</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">What a throwback</text>
</svg>
