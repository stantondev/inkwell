<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 88" fill="none">
  <!-- Postage stamp interior: "Throwback" — clock with rewind arrow -->
  <!-- Top denomination -->
  <text x="36" y="10" text-anchor="middle" font-size="5" font-family="Georgia, serif" fill="currentColor" opacity="0.5" letter-spacing="2.5" font-variant="small-caps">INKWELL</text>
  <!-- Decorative line -->
  <line x1="12" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Clock face -->
  <circle cx="36" cy="38" r="16" stroke="currentColor" stroke-width="2" opacity="0.7" fill="none"/>
  <circle cx="36" cy="38" r="13.5" stroke="currentColor" stroke-width="0.5" opacity="0.2" fill="none"/>
  <!-- Clock hands -->
  <line x1="36" y1="38" x2="36" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="36" y1="38" x2="44" y2="38" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="36" cy="38" r="1.5" fill="currentColor" opacity="0.8"/>
  <!-- Hour markers -->
  <circle cx="36" cy="25" r="1" fill="currentColor" opacity="0.4"/>
  <circle cx="49" cy="38" r="1" fill="currentColor" opacity="0.4"/>
  <circle cx="36" cy="51" r="1" fill="currentColor" opacity="0.4"/>
  <circle cx="23" cy="38" r="1" fill="currentColor" opacity="0.4"/>
  <!-- Rewind arrow -->
  <path d="M20 28 C16 32 16 40 20 46"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M17 26 L20 28 L23 26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <!-- Decorative line -->
  <line x1="12" y1="66" x2="60" y2="66" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
  <!-- Label -->
  <text x="36" y="77" text-anchor="middle" font-size="6" font-family="Georgia, serif" fill="currentColor" opacity="0.7" letter-spacing="1.5" font-variant="small-caps">THROWBACK</text>
  <text x="36" y="84" text-anchor="middle" font-size="4" font-family="Georgia, serif" fill="currentColor" opacity="0.4" font-style="italic">What a throwback</text>
</svg>
