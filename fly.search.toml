# ──────────────────────────────────────────────────────────────
# Fly.io config for Inkwell Meilisearch
# Deploy with: fly deploy --config fly.search.toml
# ──────────────────────────────────────────────────────────────

app = "inkwell-search"
primary_region = "ord"

[build]
  image = "getmeili/meilisearch:latest"

[env]
  MEILI_ENV = "production"
  MEILI_DB_PATH = "/meili_data/data.ms"
  MEILI_HTTP_ADDR = "[::]:7700"

[mounts]
  source = "meili_data"
  destination = "/meili_data"

[http_service]
  internal_port = 7700
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = 512
